openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MindForge Personal Second Brain API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: documents
    description: Document ingestion and library
  - name: chat
    description: Chat and RAG operations
  - name: tools
    description: AI tools (summarize, flashcards, mindmap, action items)
  - name: eval
    description: Evaluation and debug panel
  - name: stats
    description: Knowledge base statistics
  - name: collections
    description: Collections and folders for organizing documents
  - name: knowledge
    description: Knowledge graph and entity extraction
  - name: agent
    description: AI agent with multi-step reasoning traces
  - name: sharing
    description: Document sharing via public links
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
        - in: query
          name: tag
          schema:
            type: string
          required: false
        - in: query
          name: collectionId
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a text/markdown/PDF document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a single document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document tags or metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document and its chunks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/github:
    post:
      operationId: ingestGithubRepo
      tags: [documents]
      summary: Ingest a GitHub repository (README + code snippets)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestGithubBody"
      responses:
        "201":
          description: Ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/chunks:
    get:
      operationId: getDocumentChunks
      tags: [documents]
      summary: Get all chunks for a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chunk"

  /documents/{id}/pin:
    patch:
      operationId: pinDocument
      tags: [documents]
      summary: Toggle pin on a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/restore:
    patch:
      operationId: restoreDocument
      tags: [documents]
      summary: Restore a soft-deleted document from trash
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/duplicate:
    post:
      operationId: duplicateDocument
      tags: [documents]
      summary: Duplicate a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/share:
    post:
      operationId: shareDocument
      tags: [sharing]
      summary: Generate or retrieve a public share token for a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResult"
    delete:
      operationId: unshareDocument
      tags: [sharing]
      summary: Revoke the share token for a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Share token revoked

  /share/{token}:
    get:
      operationId: getSharedDocument
      tags: [sharing]
      summary: Get a publicly shared document by token (no auth required)
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found

  /documents/trash:
    get:
      operationId: listTrashDocuments
      tags: [documents]
      summary: List soft-deleted documents
      responses:
        "200":
          description: Trash documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /collections:
    get:
      operationId: listCollections
      tags: [collections]
      summary: List all collections with document counts
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"
    post:
      operationId: createCollection
      tags: [collections]
      summary: Create a new collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  /collections/{id}:
    patch:
      operationId: updateCollection
      tags: [collections]
      summary: Update a collection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"
    delete:
      operationId: deleteCollection
      tags: [collections]
      summary: Delete a collection (documents are unassigned, not deleted)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /knowledge-graph:
    post:
      operationId: buildKnowledgeGraph
      tags: [knowledge]
      summary: Extract a knowledge graph from selected documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeGraphBody"
      responses:
        "200":
          description: Knowledge graph result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeGraphResult"

  /agent/run:
    get:
      operationId: runAgent
      tags: [agent]
      summary: Run the multi-step AI agent with SSE streaming trace
      parameters:
        - in: query
          name: content
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of agent steps
          content:
            text/event-stream:
              schema:
                type: string

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions
      responses:
        "200":
          description: Chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatSessionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"

  /chat/sessions/{id}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Get a chat session with messages
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/sessions/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get an AI response with RAG
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: AI response with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /tools/summarize:
    post:
      operationId: summarizeDocument
      tags: [tools]
      summary: Generate a summary of a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Summary result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /tools/action-items:
    post:
      operationId: extractActionItems
      tags: [tools]
      summary: Extract action items from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Action items result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /tools/flashcards:
    post:
      operationId: generateFlashcards
      tags: [tools]
      summary: Generate flashcards from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Flashcards result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardsResult"

  /tools/mindmap:
    post:
      operationId: generateMindmap
      tags: [tools]
      summary: Generate a Mermaid mind map from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Mind map result (Mermaid syntax)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /eval/chunks:
    get:
      operationId: getRetrievedChunks
      tags: [eval]
      summary: Get last retrieved chunks and faithfulness score
      parameters:
        - in: query
          name: sessionId
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Evaluation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalResult"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /export:
    get:
      operationId: exportAllData
      tags: [stats]
      summary: Export all user data as a JSON bundle
      responses:
        "200":
          description: Full data export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportBundle"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get knowledge base overview stats
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/activity:
    get:
      operationId: getStatsActivity
      tags: [stats]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [pdf, markdown, text, github, url]
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        chunkCount:
          type: integer
        sourceUrl:
          type: ["string", "null"]
        pinned:
          type: boolean
        collectionId:
          type: ["integer", "null"]
        shareToken:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - type
        - content
        - tags
        - chunkCount
        - sourceUrl
        - pinned
        - collectionId
        - shareToken
        - deletedAt
        - createdAt
        - updatedAt

    Collection:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        documentCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - color
        - icon
        - description
        - documentCount
        - createdAt
        - updatedAt

    CreateCollectionBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        description:
          type: string
      required:
        - name

    UpdateCollectionBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        description:
          type: string

    ShareResult:
      type: object
      properties:
        shareToken:
          type: string
        shareUrl:
          type: string
      required:
        - shareToken
        - shareUrl

    KnowledgeGraphBody:
      type: object
      properties:
        documentIds:
          type: array
          items:
            type: integer
        query:
          type: string
      required:
        - documentIds

    KnowledgeGraphResult:
      type: object
      properties:
        mermaid:
          type: string
        entities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              mentions:
                type: integer
            required: [name, type, mentions]
        documentCount:
          type: integer
        documentTitles:
          type: array
          items:
            type: string
      required:
        - mermaid
        - entities
        - documentCount
        - documentTitles

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
          format: email
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]

    GetCurrentAuthUserResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: "null"

    ExchangeMobileAuthorizationCodeBody:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutMobileSessionResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ExportBundle:
      type: object
      properties:
        exportedAt:
          type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        chatSessions:
          type: array
          items:
            type: object
        flashcardDecks:
          type: array
          items:
            type: object
      required:
        - exportedAt
        - documents
        - chatSessions
        - flashcardDecks

    UploadDocumentBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [markdown, text]
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - content
        - type

    UpdateDocumentBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        collectionId:
          type: ["integer", "null"]

    IngestGithubBody:
      type: object
      properties:
        url:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - url

    Chunk:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        documentId:
          type: integer
        chunkIndex:
          type: integer
        score:
          type: ["number", "null"]
      required:
        - id
        - content
        - documentId
        - chunkIndex
        - score

    ChatSession:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - messageCount
        - createdAt
        - updatedAt

    CreateChatSessionBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        usedWebSearch:
          type: boolean
        faithfulnessScore:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - role
        - content
        - sources
        - usedWebSearch
        - faithfulnessScore
        - createdAt

    ChatSessionWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - title
        - messageCount
        - createdAt
        - updatedAt
        - messages

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    Source:
      type: object
      properties:
        documentId:
          type: integer
        documentTitle:
          type: string
        chunkContent:
          type: string
        score:
          type: number
      required:
        - documentId
        - documentTitle
        - chunkContent
        - score

    ToolDocumentBody:
      type: object
      properties:
        documentId:
          type: integer
      required:
        - documentId

    ToolResult:
      type: object
      properties:
        result:
          type: string
        documentId:
          type: integer
      required:
        - result
        - documentId

    Flashcard:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer

    FlashcardsResult:
      type: object
      properties:
        flashcards:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        documentId:
          type: integer
      required:
        - flashcards
        - documentId

    EvalResult:
      type: object
      properties:
        query:
          type: ["string", "null"]
        retrievedChunks:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
        faithfulnessScore:
          type: ["number", "null"]
        usedWebSearch:
          type: boolean
      required:
        - query
        - retrievedChunks
        - faithfulnessScore
        - usedWebSearch

    StatsOverview:
      type: object
      properties:
        totalDocuments:
          type: integer
        totalChunks:
          type: integer
        totalChatSessions:
          type: integer
        totalMessages:
          type: integer
        documentsByType:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalDocuments
        - totalChunks
        - totalChatSessions
        - totalMessages
        - documentsByType

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [document_added, document_deleted, chat_message, tool_used]
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - type
        - description
        - createdAt
