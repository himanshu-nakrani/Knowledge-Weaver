openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MindForge Personal Second Brain API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document ingestion and library
  - name: chat
    description: Chat and RAG operations
  - name: tools
    description: AI tools (summarize, flashcards, mindmap, action items)
  - name: eval
    description: Evaluation and debug panel
  - name: stats
    description: Knowledge base statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
        - in: query
          name: tag
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a text/markdown/PDF document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a single document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document tags or metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document and its chunks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/github:
    post:
      operationId: ingestGithubRepo
      tags: [documents]
      summary: Ingest a GitHub repository (README + code snippets)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestGithubBody"
      responses:
        "201":
          description: Ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/chunks:
    get:
      operationId: getDocumentChunks
      tags: [documents]
      summary: Get all chunks for a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chunk"

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions
      responses:
        "200":
          description: Chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatSessionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"

  /chat/sessions/{id}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Get a chat session with messages
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/sessions/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get an AI response with RAG
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: AI response with sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /tools/summarize:
    post:
      operationId: summarizeDocument
      tags: [tools]
      summary: Generate a summary of a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Summary result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /tools/action-items:
    post:
      operationId: extractActionItems
      tags: [tools]
      summary: Extract action items from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Action items result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /tools/flashcards:
    post:
      operationId: generateFlashcards
      tags: [tools]
      summary: Generate flashcards from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Flashcards result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardsResult"

  /tools/mindmap:
    post:
      operationId: generateMindmap
      tags: [tools]
      summary: Generate a Mermaid mind map from a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolDocumentBody"
      responses:
        "200":
          description: Mind map result (Mermaid syntax)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"

  /eval/chunks:
    get:
      operationId: getRetrievedChunks
      tags: [eval]
      summary: Get last retrieved chunks and faithfulness score
      parameters:
        - in: query
          name: sessionId
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Evaluation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalResult"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get knowledge base overview stats
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/activity:
    get:
      operationId: getStatsActivity
      tags: [stats]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [pdf, markdown, text, github]
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        chunkCount:
          type: integer
        sourceUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - type
        - content
        - tags
        - chunkCount
        - sourceUrl
        - createdAt
        - updatedAt

    UploadDocumentBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [markdown, text]
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - content
        - type

    UpdateDocumentBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string

    IngestGithubBody:
      type: object
      properties:
        url:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - url

    Chunk:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        documentId:
          type: integer
        chunkIndex:
          type: integer
        score:
          type: ["number", "null"]
      required:
        - id
        - content
        - documentId
        - chunkIndex
        - score

    ChatSession:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - messageCount
        - createdAt
        - updatedAt

    CreateChatSessionBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        usedWebSearch:
          type: boolean
        faithfulnessScore:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - role
        - content
        - sources
        - usedWebSearch
        - faithfulnessScore
        - createdAt

    ChatSessionWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - title
        - messageCount
        - createdAt
        - updatedAt
        - messages

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    Source:
      type: object
      properties:
        documentId:
          type: integer
        documentTitle:
          type: string
        chunkContent:
          type: string
        score:
          type: number
      required:
        - documentId
        - documentTitle
        - chunkContent
        - score

    ToolDocumentBody:
      type: object
      properties:
        documentId:
          type: integer
      required:
        - documentId

    ToolResult:
      type: object
      properties:
        result:
          type: string
        documentId:
          type: integer
      required:
        - result
        - documentId

    Flashcard:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer

    FlashcardsResult:
      type: object
      properties:
        flashcards:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        documentId:
          type: integer
      required:
        - flashcards
        - documentId

    EvalResult:
      type: object
      properties:
        query:
          type: ["string", "null"]
        retrievedChunks:
          type: array
          items:
            $ref: "#/components/schemas/Chunk"
        faithfulnessScore:
          type: ["number", "null"]
        usedWebSearch:
          type: boolean
      required:
        - query
        - retrievedChunks
        - faithfulnessScore
        - usedWebSearch

    StatsOverview:
      type: object
      properties:
        totalDocuments:
          type: integer
        totalChunks:
          type: integer
        totalChatSessions:
          type: integer
        totalMessages:
          type: integer
        documentsByType:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalDocuments
        - totalChunks
        - totalChatSessions
        - totalMessages
        - documentsByType

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [document_added, document_deleted, chat_message, tool_used]
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - type
        - description
        - createdAt
